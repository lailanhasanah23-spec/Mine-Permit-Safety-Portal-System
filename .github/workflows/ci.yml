name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, pdo_sqlite, dom, xml, curl
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=-1
          cache: composer

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Validate Composer manifest
        run: composer validate --strict --no-check-lock

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install NPM dependencies
        run: npm ci

      - name: Prepare application environment
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate --ansi

      - name: Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan migrate --force --no-interaction

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: php artisan test

      - name: Code style check
        run: ./vendor/bin/pint --test

      - name: Static analysis (PHPStan) - if available
        run: |
          if [ -x ./vendor/bin/phpstan ]; then
            ./vendor/bin/phpstan analyse
          else
            echo "phpstan is not installed; skipping"
          fi

      - name: Static analysis (Psalm) - if available
        run: |
          if [ -x ./vendor/bin/psalm ]; then
            ./vendor/bin/psalm
          else
            echo "psalm is not installed; skipping"
          fi

      - name: Build assets
        run: npm run build
